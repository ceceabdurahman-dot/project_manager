services:
  app:
    image: node:22-bookworm-slim
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVER_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_hostinger_docker_env_32_chars_min}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      AUTH_COOKIE_SECURE: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://proment.click,https://www.proment.click}
      DB_PATH: ../data/projectdb.sqlite
      UPLOAD_PATH: ../uploads
      BACKUP_PATH: ../backups
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-30}
    command:
      - sh
      - -lc
      - apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/* && rm -rf /app/source && git clone --depth=1 --branch master https://github.com/ceceabdurahman-dot/project_manager.git /app/source && cd /app/source/backend && npm ci --omit=dev && cd /app/source/frontend && npm ci && npm run build && cd /app/source && npm start
    volumes:
      - proment_data:/app/data
      - proment_uploads:/app/uploads
      - proment_backups:/app/backups
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  proment_data:
  proment_uploads:
  proment_backups:
